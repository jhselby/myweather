<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wyman Cove Weather QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 44px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    width: 340px;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .icon {
    font-size: 36px;
    line-height: 1;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    color: #0b1220;
    letter-spacing: -0.3px;
    text-align: center;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 12px;
    font-weight: 500;
    color: #8a9bb0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .qr-wrap {
    background: white;
    border-radius: 16px;
    padding: 12px;
    border: 1.5px solid #e8edf2;
  }

  .url {
    font-size: 15px;
    font-weight: 600;
    color: #0a84ff;
    letter-spacing: -0.2px;
  }

  .footer {
    font-size: 11px;
    color: #b0bcc8;
    text-align: center;
    line-height: 1.5;
  }

  @media print {
    body { background: white; }
    .card { box-shadow: none; border: 1px solid #e0e0e0; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="icon">⛵</div>
    <div class="title">Wyman Cove Weather</div>
    <div class="subtitle">Marblehead, MA</div>
  </div>

  <div class="qr-wrap" id="qrcode"></div>

  <div class="url">wymancove.com</div>

  <div class="footer">Scan to open · Add to home screen<br>for the full app experience</div>
</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://wymancove.com",
    width: 220,
    height: 220,
    colorDark: "#0b1220",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
