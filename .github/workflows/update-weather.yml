name: Update Weather Data

on:
  schedule:
    - cron: '6,21,36,51 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil pytz beautifulsoup4 lxml

      - name: Run collector
        run: python -m weather_collector.collector

      - name: Configure Git
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "weather-bot@github.com"

      - name: Commit and push changes
        run: |
          git add weather_data.json
          if git diff --cached --quiet; then
            echo "No changes to weather_data.json"
          else
            git commit -m "Update weather data $(date -u +'%Y-%m-%d %H:%M') UTC"
- name: Commit and push changes
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "weather-bot@github.com"
          git add weather_data.json
          if git diff --cached --quiet; then
            echo "No changes to weather_data.json"
          else
            git commit -m "Update weather data $(date -u +'%Y-%m-%d %H:%M') UTC"
            # Retry push with pull if rejected
            for i in {1..3}; do
              git push origin main && break || {
                echo "Push failed, pulling and retrying..."
                git pull --rebase origin main
                sleep 2
              }
            done
          fi
