name: Update Weather Data

on:
  schedule:
    - cron: '6,21,36,51 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil pytz beautifulsoup4 lxml

      - name: Run collector
        run: python collector.py

      - name: Configure Git
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "weather-bot@github.com"

      - name: Commit and push changes
        run: |
          # Clean up any unstaged changes first
          git reset --hard HEAD
          git clean -fd
          
          # Add the new data
          git add weather_data.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update weather data $(date -u +'%Y-%m-%d %H:%M') UTC"
            
            # Pull with rebase, handling conflicts
            git pull --rebase origin main || {
              echo "Rebase conflict, resetting and trying again"
              git rebase --abort
              git reset --hard origin/main
              git add weather_data.json
              git commit -m "Update weather data $(date -u +'%Y-%m-%d %H:%M') UTC"
            }
            
            # Push
            git push origin main
          fi
