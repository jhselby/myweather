<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyWeather — Decay Corrections</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171b22;
    --ink: #e7ecf3;
    --muted: #8a93a3;
    --accent: #4aa3ff;
    --warn: #ff9f4a;
    --pre: #8a93a3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 18px;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #242833;
  }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  h2.section {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 22px 2px 10px;
    font-weight: 600;
  }
  .meta { color: var(--muted); font-size: 12px; }
  .meta strong { color: var(--ink); font-weight: 500; }
  .meta a { color: var(--accent); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid #242833;
    border-radius: 8px;
    padding: 12px 12px 6px;
  }
  .card h3 {
    font-size: 13px;
    margin: 0 0 8px;
    color: var(--muted);
    font-weight: 500;
    display: flex;
    justify-content: space-between;
  }
  .card h3 .name { color: var(--ink); font-weight: 600; }
  .card h3 .summary { color: var(--muted); font-weight: 400; }
  .chart-wrap { position: relative; height: 220px; }
  .status {
    padding: 10px 12px;
    color: var(--warn);
    font-size: 13px;
    background: var(--panel);
    border: 1px solid #242833;
    border-radius: 8px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<header>
  <h1>Decay corrections</h1>
  <span class="meta" id="meta">loading…</span>
</header>

<div id="status-corrections" class="status" hidden></div>
<h2 class="section">1. Fitted correction curves — what is being applied</h2>
<div id="grid-corrections" class="grid"></div>

<div id="status-live" class="status" hidden></div>
<h2 class="section">2. Live forecast — with vs without decay correction</h2>
<div id="grid-live" class="grid"></div>

<script>
const CORRECTIONS_URL = "https://data.wymancove.com/decay_corrections.json";
const WEATHER_URL     = "https://data.wymancove.com/weather_data.json";

const FIELDS = [
  { key: "t",  label: "Temperature", unit: "°F",  array: "corrected_temperature"     },
  { key: "dp", label: "Dew point",   unit: "°F",  array: "corrected_dew_point"       },
  { key: "h",  label: "Humidity",    unit: "%",   array: "corrected_humidity"        },
  { key: "ws", label: "Wind speed",  unit: "mph", array: "wind_speed"                },
  { key: "wg", label: "Wind gust",   unit: "mph", array: "wind_gusts"                },
  { key: "pp", label: "Precip prob", unit: "%",   array: "precipitation_probability" },
];

function showStatus(id, msg) {
  const s = document.getElementById(id);
  s.textContent = msg;
  s.hidden = false;
}

function renderMeta(corrDoc, wxDoc, wxLastModified) {
  const el = document.getElementById("meta");
  const dm = (wxDoc && wxDoc.decay_meta) || null;
  const applied = dm
    ? `<strong style="color:#4aa3ff;">applied ${dm.applied_at}</strong> (${dm.cells_corrected.toLocaleString()} cells${dm.cells_capped ? `, ${dm.cells_capped} capped` : ""})`
    : `<strong style="color:#ff9f4a;">NOT yet applied to this payload</strong>`;
  el.innerHTML =
    `fitted <strong>${corrDoc.fitted_at || "?"}</strong> · ` +
    `<strong>${(corrDoc.n_pairs || 0).toLocaleString()}</strong> pairs · ` +
    `${applied} · ` +
    `<a href="${CORRECTIONS_URL}" target="_blank">corrections</a> · ` +
    `<a href="${WEATHER_URL}" target="_blank">weather</a>`;
}

function buildCorrectionChart(canvas, field, corrections, counts) {
  const labels = Array.from({ length: corrections.length }, (_, i) => i);
  const series = corrections.map(v => (v === null || v === undefined ? NaN : v));
  return new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: `mean error (${field.unit})`, data: series,
          borderColor: "#4aa3ff", backgroundColor: "rgba(74,163,255,0.15)",
          borderWidth: 1.5, pointRadius: 2, tension: 0.25, spanGaps: false, yAxisID: "y" },
        { label: "n samples", data: counts, type: "bar",
          backgroundColor: "rgba(138,147,163,0.25)", borderWidth: 0, yAxisID: "y2" },
      ],
    },
    options: chartOpts(field, { secondaryY: true, yTitle: `mean error (${field.unit})` }),
  });
}

function buildLiveChart(canvas, field, applied, postDecay, preDecay) {
  const labels = Array.from({ length: postDecay.length }, (_, i) => i);
  // Labels depend on whether the live payload already had decay subtracted.
  // applied=true:  "live" is post-decay; the other line is the pre-decay value (live + correction).
  // applied=false: "live" is pre-decay;  the other line is what decay WOULD produce (live - correction).
  const liveLabel  = applied ? `live (with decay)`               : `live (decay not applied yet)`;
  const otherLabel = applied ? `pre-decay (live + correction)`   : `what decay would produce (live − correction)`;
  return new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: liveLabel, data: postDecay,
          borderColor: "#4aa3ff", backgroundColor: "rgba(74,163,255,0.15)",
          borderWidth: 1.8, pointRadius: 0, tension: 0.25, spanGaps: true },
        { label: otherLabel, data: preDecay,
          borderColor: "#8a93a3", backgroundColor: "rgba(0,0,0,0)",
          borderWidth: 1.2, borderDash: [4, 4], pointRadius: 0, tension: 0.25, spanGaps: true },
      ],
    },
    options: chartOpts(field, { secondaryY: false, yTitle: `value (${field.unit})` }),
  });
}

function chartOpts(field, { secondaryY, yTitle }) {
  const scales = {
    x: {
      title: { display: true, text: "lead time (hours)", color: "#8a93a3" },
      ticks: { color: "#8a93a3", autoSkip: true, maxTicksLimit: 12 },
      grid: { color: "#242833" },
    },
    y: {
      title: { display: true, text: yTitle, color: "#8a93a3" },
      ticks: { color: "#8a93a3" },
      grid: { color: "#242833" },
      beginAtZero: false,
    },
  };
  if (secondaryY) {
    scales.y2 = {
      position: "right",
      title: { display: true, text: "n", color: "#8a93a3" },
      ticks: { color: "#8a93a3" },
      grid: { display: false },
      beginAtZero: true,
    };
  }
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: { labels: { color: "#8a93a3", boxWidth: 10, font: { size: 11 } }, position: "bottom" },
      tooltip: { callbacks: { title: (items) => `lead ${items[0].label}h` } },
    },
    scales,
  };
}

function fmtFixed(v, digits) {
  return (v === null || v === undefined || Number.isNaN(v)) ? "—" : Number(v).toFixed(digits);
}

async function load() {
  let corrDoc, wxDoc, wxLastModified;
  try {
    const res = await fetch(CORRECTIONS_URL + "?_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) {
      showStatus("status-corrections", `No decay_corrections.json yet (HTTP ${res.status}). Trigger a Fitter run, then refresh.`);
      document.getElementById("meta").textContent = "no corrections data";
    } else {
      corrDoc = await res.json();
    }
  } catch (err) {
    showStatus("status-corrections", `Corrections load failed: ${err.message}`);
  }

  try {
    const res = await fetch(WEATHER_URL + "?_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) {
      showStatus("status-live", `weather_data.json load failed (HTTP ${res.status}).`);
    } else {
      wxLastModified = res.headers.get("last-modified") || "";
      wxDoc = await res.json();
    }
  } catch (err) {
    showStatus("status-live", `weather_data.json load failed: ${err.message}`);
  }

  if (corrDoc) renderMeta(corrDoc, wxDoc, wxLastModified);

  // If decay hasn't been applied to this weather_data yet, "post vs pre" is
  // misleading — what we're showing as "with decay" is actually pre-decay,
  // and "without decay" is pre-decay-plus-correction (a confused number).
  // Warn and skip section 2.
  const decayApplied = !!(wxDoc && wxDoc.decay_meta);

  if (corrDoc) {
    const grid = document.getElementById("grid-corrections");
    for (const f of FIELDS) {
      const corrections = (corrDoc.corrections || {})[f.key] || [];
      const counts = (corrDoc.n_samples || {})[f.key] || [];
      const validVals = corrections.filter(v => v !== null && v !== undefined);
      const meanAbs = validVals.length
        ? (validVals.reduce((s, v) => s + Math.abs(v), 0) / validVals.length).toFixed(2)
        : "—";
      const totalN = counts.reduce((s, v) => s + v, 0);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        `<h3><span class="name">${f.label} (${f.key})</span>` +
        `<span class="summary">|mean| ${meanAbs} ${f.unit} · ${totalN.toLocaleString()} pairs</span></h3>` +
        `<div class="chart-wrap"><canvas></canvas></div>`;
      grid.appendChild(card);
      buildCorrectionChart(card.querySelector("canvas"), f, corrections, counts);
    }
  }

  if (corrDoc && wxDoc && wxDoc.hourly) {
    if (!decayApplied) {
      showStatus("status-live", "Decay not yet applied to the live payload (collector tick that produced this weather_data.json ran on old code). Solid line is the current live forecast; dashed line is what Piece 4 WILL produce on the next tick (= live − correction).");
    }
    const grid = document.getElementById("grid-live");
    for (const f of FIELDS) {
      const corrections = (corrDoc.corrections || {})[f.key] || [];
      const liveArr = wxDoc.hourly[f.array] || [];
      const n = Math.min(corrections.length, liveArr.length);
      const live = [];
      const other = [];
      for (let i = 0; i < n; i++) {
        const v = liveArr[i];
        const c = corrections[i];
        if (v === null || v === undefined) {
          live.push(NaN);
          other.push(NaN);
          continue;
        }
        live.push(Number(v));
        if (c === null || c === undefined) {
          other.push(Number(v));  // no correction at this lead → same as live
        } else if (decayApplied) {
          // Apply did: arr[h] = val − correction. Reverse: pre-decay = live + correction.
          other.push(Number(v) + Number(c));
        } else {
          // Apply hasn't run on this payload. Show what it WOULD produce: live − correction.
          other.push(Number(v) - Number(c));
        }
      }

      const digits = f.key === "pp" ? 0 : 1;
      const nowVal = live.length ? fmtFixed(live[0], digits) : "—";
      const v24    = live.length > 24 ? fmtFixed(live[24], digits) : "—";

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        `<h3><span class="name">${f.label} (${f.key})</span>` +
        `<span class="summary">now ${nowVal}${f.unit} · +24h ${v24}${f.unit}</span></h3>` +
        `<div class="chart-wrap"><canvas></canvas></div>`;
      grid.appendChild(card);
      buildLiveChart(card.querySelector("canvas"), f, decayApplied, live, other);
    }
  } else if (corrDoc && wxDoc) {
    showStatus("status-live", "weather_data.json loaded but has no hourly block.");
  }
}

load();
</script>
</body>
</html>
